# partially based on https://github.com/gpakosz/.tmux/blob/master/.tmux.conf

# Prefix
set -g prefix2 C-a                        # GNU-Screen compatible prefix
bind C-a send-prefix -2

set -g history-limit 50000                 # boost history

setw -g automatic-rename on   # rename window to reflect current program
set -g renumber-windows on    # renumber windows when a window is closed

set -g set-titles on          # set terminal title

# set -g status-right "#{pane_current_path}"

### Clipboard
set -s set-clipboard external

### Mouse ###

set -g mouse on                          # enable mouse support (tmux 2.1 and above)
# unbind -T copy-mode MouseDragEnd1Pane
# unbind -T copy-mode-vi MouseDragEnd1Pane
# set -g allow-passthrough on
set-option -g terminal-features 'xterm*:clipboard'

### Keybinds ###

set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'
set -g focus-events on

# reload config
bind -N "reload tmux.conf" r source-file ~/.config/tmux/tmux.conf \; display "tmux.conf sourced"

## Window management

# open new window in cwd
bind -N "create new window" c new-window -c "#{pane_current_path}"

# lowercase V: split current window vertically and open in cwd
bind -N "split window vertically" v split-window -h -c "#{pane_current_path}"
unbind '"'
# capital V: split current window horizontally and open in cwd
bind -N "split window horizontally" V split-window -v -c "#{pane_current_path}"
unbind '%'

## Pane management
# pane moving
bind -N "move pane left"  -r h select-pane -L  # move left
bind -N "move pane down"  -r j select-pane -D  # move down
bind -N "move pane up"    -r k select-pane -U  # move up
bind -N "move pane right" -r l select-pane -R  # move right
bind > swap-pane -D       # swap current pane with the next one
bind < swap-pane -U       # swap current pane with the previous one

# pane resizing
bind -N "resize pane left by 2"  -r H resize-pane -L 2
bind -N "resize pane down by 2"  -r J resize-pane -D 2
bind -N "resize pane up by 2"    -r K resize-pane -U 2
bind -N "resize pane right by 2" -r L resize-pane -R 2

